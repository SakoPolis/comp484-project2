<!DOCTYPE html>
<html>
  <head>
    <title>Your Discord Kitten</title>
    <meta name="description" content="A cool thing made with Glitch">
    <link id="favicon" rel="icon" href="https://glitch.com/edit/favicon-app.ico" type="image/x-icon">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <h1>
        This is your Discord Kitten
      </h1>
    </header>

    <main>
      <!-- Left panel: main pet image that swaps based on happiness. -->
      <section class="pet-image-container">
         <!-- Replaced pet image with my own pet image -->
        <img class="pet-image" src="images/kitten.png" alt="A discord kitten">
      </section>
      <!-- Right panel: live stats and action buttons. -->
      <section class="dashboard">
        <div>Name: <strong><span class="name"></span></strong></div>
        <div>Weight: <strong><span class="weight"></span> pounds</strong></div>
        <div>Happiness: <strong><span class="happiness"></span> tail wags (per min)</strong></div>
        <div>Distance: <strong><span class="distance"></span> feet away</strong></div>

        <!-- Action controls connected to jQuery click handlers in script.js/script.ts. -->
        <div class="button-container">
          <button class="treat-button">
            Treat
          </button>
          <button class="play-button">
            Play
          </button>
          <button class="exercise-button">
            Exercise
          </button>
          <button class="call-button">
            Call
          </button>
        </div>

        <div class="call-audio-controls">
          <label for="call-volume">Call Volume</label>
          <input id="call-volume" type="range" min="0" max="1" step="0.1" value="1">
          <label class="mute-toggle" for="call-mute">
            <input id="call-mute" type="checkbox">
            Mute
          </label>
        </div>
      </section>
    </main>

    <!-- Your web-app is https, so your scripts need to be too -->
    <script src="https://code.jquery.com/jquery-2.2.1.min.js"
            integrity="sha256-gvQgAFzTH6trSrAWoH1iPo9Xc96QxSZ3feW6kem+O00="
            crossorigin="anonymous"></script>
  </body>
</html>
